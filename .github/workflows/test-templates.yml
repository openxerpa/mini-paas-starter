name: Test Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-templates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cruft, ansible-core, ansible-lint
        run: pip install cruft ansible-core ansible-lint

      - name: Run template tests
        run: ./scripts/test-cruft.sh
