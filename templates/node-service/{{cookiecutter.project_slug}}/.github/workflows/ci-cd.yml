name: CI/CD

on:
  push:
    branches: [main, dev, test]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: {{ cookiecutter.docker_registry }}
          username: {% raw %}${{ github.actor }}{% endraw %}
          password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            {{ cookiecutter.docker_registry }}/{% raw %}${{ github.repository_owner }}{% endraw %}/{{ cookiecutter.project_slug }}:latest
            {{ cookiecutter.docker_registry }}/{% raw %}${{ github.repository_owner }}{% endraw %}/{{ cookiecutter.project_slug }}:{% raw %}${{ github.sha }}{% endraw %}
          cache-from: type=gha
          cache-to: type=gha

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          auth-key: {% raw %}${{ secrets.TAILSCALE_AUTHKEY }}{% endraw %}

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "{% raw %}${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}{% endraw %}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Write inventory
        run: |
          echo "{% raw %}${{ secrets.DEPLOY_HOST }}{% endraw %}," > /tmp/inventory.yml

      # Env mapping: main → prod, dev → dev, test → test. Customize as needed.
      - name: Set TRAEFIK_HOST from branch
        id: env
        run: |
          if [ "{% raw %}${{ github.ref }}{% endraw %}" = "refs/heads/main" ]; then
            echo "traefik_host={{ cookiecutter.project_slug }}.{{ cookiecutter.base_domain_prod }}" >> $GITHUB_OUTPUT
          elif [ "{% raw %}${{ github.ref }}{% endraw %}" = "refs/heads/dev" ]; then
            echo "traefik_host={{ cookiecutter.project_slug }}-dev.{{ cookiecutter.base_domain_dev }}" >> $GITHUB_OUTPUT
          else
            echo "traefik_host={{ cookiecutter.project_slug }}-test.{{ cookiecutter.base_domain_test }}" >> $GITHUB_OUTPUT
          fi

      - name: Write deploy playbook
        run: |
          cat > /tmp/deploy.yml << 'PLAYBOOK'
          - hosts: all
            become: true
            vars:
              deploy_dir: /opt/apps/{{ cookiecutter.project_slug }}
              docker_registry: {{ cookiecutter.docker_registry }}
            tasks:
              - ansible.builtin.file:
                  path: "{{ "{{" }} deploy_dir {{ "}}" }}"
                  state: directory
                  mode: "0755"
              - ansible.builtin.copy:
                  src: docker-compose.yml
                  dest: "{{ "{{" }} deploy_dir {{ "}}" }}/docker-compose.yml"
                  mode: "0644"
              - ansible.builtin.copy:
                  content: "TRAEFIK_HOST={{ "{{" }} traefik_host {{ "}}" }}\n"
                  dest: "{{ "{{" }} deploy_dir {{ "}}" }}/.env"
                  mode: "0644"
              - ansible.builtin.command:
                  cmd: docker login {{ cookiecutter.docker_registry }} -u {{ "{{" }} deploy_registry_user {{ "}}" }} -p {{ "{{" }} deploy_registry_token {{ "}}" }}
                  no_log: true
              - ansible.builtin.command:
                  cmd: docker compose pull && docker compose up -d
                  chdir: "{{ "{{" }} deploy_dir {{ "}}" }}"
          PLAYBOOK

      - name: Run deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i /tmp/inventory.yml /tmp/deploy.yml \
            -e ansible_user={% raw %}${{ secrets.DEPLOY_USER }}{% endraw %} \
            -e ansible_ssh_private_key_file=~/.ssh/id_rsa \
            -e deploy_registry_user={% raw %}${{ github.repository_owner }}{% endraw %} \
            -e deploy_registry_token={% raw %}${{ secrets.DEPLOY_REGISTRY_TOKEN }}{% endraw %} \
            -e traefik_host={% raw %}${{ steps.env.outputs.traefik_host }}{% endraw %}
