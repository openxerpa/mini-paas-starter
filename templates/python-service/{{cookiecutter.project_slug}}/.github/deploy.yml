---
- name: Deploy application to server
  hosts: all
  become: true
  vars:
    deploy_dir: /opt/apps/{{ cookiecutter.project_slug }}
    docker_registry: {{ cookiecutter.docker_registry }}
    compose_src: ""
    traefik_host: ""
    image_tag: "latest"
  tasks:
    - name: Create deploy directory
      ansible.builtin.file:
        path: "{% raw %}{{ deploy_dir }}{% endraw %}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose.yml
      ansible.builtin.copy:
        src: "{% raw %}{{ compose_src }}{% endraw %}"
        dest: "{% raw %}{{ deploy_dir }}{% endraw %}/docker-compose.yml"
        mode: "0644"

    - name: Write .env
      ansible.builtin.copy:
        content: |
          TRAEFIK_HOST={% raw %}{{ traefik_host }}{% endraw %}
          IMAGE_TAG={% raw %}{{ image_tag }}{% endraw %}
        dest: "{% raw %}{{ deploy_dir }}{% endraw %}/.env"
        mode: "0644"

    - name: Docker registry login
      ansible.builtin.command:
        cmd: docker login {{ cookiecutter.docker_registry }} -u {% raw %}{{ deploy_registry_user }}{% endraw %} -p {% raw %}{{ deploy_registry_token }}{% endraw %}
      no_log: true
      changed_when: false
      when: {% raw %}deploy_registry_token | default('', true) | length > 0{% endraw %}

    - name: Fail if DEPLOY_REGISTRY_TOKEN missing for ghcr.io
      ansible.builtin.fail:
        msg: "DEPLOY_REGISTRY_TOKEN is required for ghcr.io private images. Add it in Settings → Secrets → Actions."
      when: {% raw %}(deploy_registry_token | default('', true) | length == 0) and (docker_registry == 'ghcr.io'){% endraw %}

    - name: Pull and start containers
      ansible.builtin.shell:
        cmd: docker compose pull && docker compose up -d
        chdir: "{% raw %}{{ deploy_dir }}{% endraw %}"
      changed_when: false

    - name: Wait for containers to start
      ansible.builtin.pause:
        seconds: 5

    - name: Health check - verify container running
      ansible.builtin.shell:
        cmd: docker compose ps
        chdir: "{% raw %}{{ deploy_dir }}{% endraw %}"
      register: compose_ps
      changed_when: false
      failed_when: "'running' not in compose_ps.stdout"
