name: CI/CD

on:
  push:
    branches: [main, dev, test]
  workflow_dispatch:

concurrency:
  group: deploy-{% raw %}${{ github.ref_name }}{% endraw %}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      env_name: {% raw %}${{ steps.env.outputs.env_name }}{% endraw %}
      traefik_host: {% raw %}${{ steps.env.outputs.traefik_host }}{% endraw %}
      image_tag_prefix: {% raw %}${{ steps.env.outputs.image_tag_prefix }}{% endraw %}
    steps:
      - name: Resolve environment
        id: env
        run: |
          case "{% raw %}${{ github.ref_name }}{% endraw %}" in
            main)
              echo "env_name=production" >> $GITHUB_OUTPUT
              echo "image_tag_prefix=prod" >> $GITHUB_OUTPUT
              echo "traefik_host={{ cookiecutter.project_slug }}.{{ cookiecutter.base_domain_prod }}" >> $GITHUB_OUTPUT
              ;;
            dev)
              echo "env_name=dev" >> $GITHUB_OUTPUT
              echo "image_tag_prefix=dev" >> $GITHUB_OUTPUT
              echo "traefik_host={{ cookiecutter.project_slug }}.dev.{{ cookiecutter.base_domain_dev }}" >> $GITHUB_OUTPUT
              ;;
            test)
              echo "env_name=test" >> $GITHUB_OUTPUT
              echo "image_tag_prefix=test" >> $GITHUB_OUTPUT
              echo "traefik_host={{ cookiecutter.project_slug }}.test.{{ cookiecutter.base_domain_test }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unsupported branch '{% raw %}${{ github.ref_name }}{% endraw %}'"
              exit 1
              ;;
          esac

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build-and-push:
    needs: [prepare, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: {{ cookiecutter.docker_registry }}
          username: {% raw %}${{ github.actor }}{% endraw %}
          password: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: {{ cookiecutter.docker_registry }}/{% raw %}${{ github.repository_owner }}{% endraw %}/{{ cookiecutter.project_slug }}
          tags: |
            type=raw,value={% raw %}${{ needs.prepare.outputs.image_tag_prefix }}{% endraw %}-latest
            type=sha,prefix={% raw %}${{ needs.prepare.outputs.image_tag_prefix }}{% endraw %}-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: {% raw %}${{ steps.meta.outputs.tags }}{% endraw %}
          labels: {% raw %}${{ steps.meta.outputs.labels }}{% endraw %}
          cache-from: type=gha
          cache-to: type=gha

  deploy:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: {% raw %}${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}{% endraw %}
          oauth-secret: {% raw %}${{ secrets.TAILSCALE_OAUTH_SECRET }}{% endraw %}
          tags: tag:ci

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Ansible
        run: uv tool install ansible-core --with ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          case "{% raw %}${{ needs.prepare.outputs.env_name }}{% endraw %}" in
            production)
              echo "{% raw %}${{ secrets.PROD_SSH_KEY }}{% endraw %}" > ~/.ssh/id_rsa
              ;;
            dev)
              echo "{% raw %}${{ secrets.DEV_SSH_KEY }}{% endraw %}" > ~/.ssh/id_rsa
              ;;
            test)
              echo "{% raw %}${{ secrets.TEST_SSH_KEY }}{% endraw %}" > ~/.ssh/id_rsa
              ;;
            *)
              echo "::error::Unknown env_name"
              exit 1
              ;;
          esac
          chmod 600 ~/.ssh/id_rsa

      - name: Run deploy
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DEPLOY_USER: {% raw %}${{ secrets.DEPLOY_USER }}{% endraw %}
        run: |
          ansible_user="${DEPLOY_USER:-root}"
          case "{% raw %}${{ needs.prepare.outputs.env_name }}{% endraw %}" in
            production)
              server_ip="{% raw %}${{ secrets.PROD_TAILSCALE_IP }}{% endraw %}"
              ;;
            dev)
              server_ip="{% raw %}${{ secrets.DEV_TAILSCALE_IP }}{% endraw %}"
              ;;
            test)
              server_ip="{% raw %}${{ secrets.TEST_TAILSCALE_IP }}{% endraw %}"
              ;;
            *)
              echo "::error::Unknown env_name"
              exit 1
              ;;
          esac
          printf '[all]\n%s\n' "$server_ip" > /tmp/inventory.yml
          ansible-playbook -i /tmp/inventory.yml .github/deploy.yml \
            -e ansible_user="$ansible_user" \
            -e ansible_ssh_private_key_file=~/.ssh/id_rsa \
            -e compose_src=$GITHUB_WORKSPACE/docker-compose.yml \
            -e deploy_registry_user={% raw %}${{ github.repository_owner }}{% endraw %} \
            -e deploy_registry_token={% raw %}${{ secrets.DEPLOY_REGISTRY_TOKEN }}{% endraw %} \
            -e traefik_host={% raw %}${{ needs.prepare.outputs.traefik_host }}{% endraw %} \
            -e image_tag={% raw %}${{ needs.prepare.outputs.image_tag_prefix }}{% endraw %}-latest
