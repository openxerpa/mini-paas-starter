services:
  app:
    image: {{ cookiecutter.docker_registry }}/{{ cookiecutter.github_org }}/{{ cookiecutter.project_slug }}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    pull_policy: always
    environment:
      - PORT={{ cookiecutter.service_port }}
      - GOMEMLIMIT=${GOMEMLIMIT:-1280MiB}
{% if cookiecutter.service_type == "external" %}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{ cookiecutter.project_slug }}.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.{{ cookiecutter.project_slug }}.entrypoints=web"
      - "traefik.http.services.{{ cookiecutter.project_slug }}.loadbalancer.server.port={{ cookiecutter.service_port }}"
{% else %}
    container_name: {{ cookiecutter.project_slug }}
{% endif %}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${DEPLOY_MEMORY:-{{ cookiecutter.memory_limit }}}
          cpus: "${DEPLOY_CPUS:-{{ cookiecutter.cpus_default }}}"
        reservations:
          memory: 256M
          cpus: "0.5"
    networks:
      - webgateway

networks:
  webgateway:
    external: true
    name: traefik_webgateway
