services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TRAEFIK_DASHBOARD_HOST=${TRAEFIK_DASHBOARD_HOST:-traefik.local}
    command:
      - --api.dashboard=true
      - --entrypoints.web.address=:80
      - --entrypoints.dashboard.address=:8080
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik_webgateway
      - --http.routers.dashboard.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - --http.routers.dashboard.service=api@internal
      - --http.routers.dashboard.entrypoints=dashboard
    networks:
      - webgateway

networks:
  webgateway:
    external: true
    name: traefik_webgateway
